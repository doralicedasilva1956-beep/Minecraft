plugins { id 'com.android.application' }

android {
    namespace 'com.pocket.launcher'
    compileSdk 34
    defaultConfig {
        applicationId "com.pocket.launcher"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
        ndk { abiFilters "armeabi-v7a" }
    }
}
